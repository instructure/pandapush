name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run eslint
        continue-on-error: false

  test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker images
        run: docker compose build --pull
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1

      - name: Create required directories
        run: |
          mkdir -p localdata
          chmod 777 localdata

      - name: Start services
        run: docker compose up -d

      - name: Run unit tests with coverage
        id: unit-tests
        run: |
          docker compose exec -T web npm run test:unit -- --coverage --json --outputFile=/usr/src/app/localdata/unit-results.json > unit-output.txt 2>&1 || true
          docker compose exec -T web cat localdata/unit-results.json > unit-results.json || echo '{}' > unit-results.json
        continue-on-error: true

      - name: Run integration tests with coverage
        id: integration-tests
        run: |
          docker compose exec -T web npm run test:integration -- --coverage --json --outputFile=/usr/src/app/localdata/integration-results.json > integration-output.txt 2>&1 || true
          docker compose exec -T web cat localdata/integration-results.json > integration-results.json || echo '{}' > integration-results.json
        continue-on-error: true

      - name: Generate test summary
        if: always()
        id: test-summary
        run: |
          SUMMARY=$(./scripts/generate-test-summary.sh)
          echo "summary<<EOFMARKER" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOFMARKER" >> $GITHUB_OUTPUT

      - name: Comment PR with test results
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-results
          message: ${{ steps.test-summary.outputs.summary }}

      - name: Check for test failures
        if: failure()
        run: |
          echo "Tests failed! Showing container logs..."
          docker compose logs web

      - name: Cleanup
        if: always()
        run: docker compose down -v

  e2e:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-e2e-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-e2e-
            ${{ runner.os }}-buildx-

      - name: Build Docker images
        run:
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml build
          --pull
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1

      - name: Create required directories
        run: |
          mkdir -p localdata playwright-report test-results
          chmod 777 localdata playwright-report test-results

      - name: Start services
        run:
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d

      - name: Run E2E tests
        run:
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml run
          --rm e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Check for E2E test failures
        if: failure()
        run: |
          echo "E2E tests failed! Showing container logs..."
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs web

      - name: Cleanup
        if: always()
        run:
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v
